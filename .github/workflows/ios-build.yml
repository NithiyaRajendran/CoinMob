name: iOS Build

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest

    steps:
      # 1️⃣ Checkout your repo
      - uses: actions/checkout@v4

      # 2️⃣ Setup Node (for React Native)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3️⃣ Install JS dependencies
      - name: Install dependencies
        run: npm install

      # 4️⃣ Setup Ruby (needed for CocoaPods)
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2

      # 5️⃣ Install CocoaPods
      - name: Install CocoaPods
        run: |
          gem install cocoapods
          cd ios
          pod install
          cd ..

      # 6️⃣ Decode certificates & provisioning profile
      - name: Decode Certificates
        env:
          APP_P12_BASE64: ${{ secrets.APP_P12_BASE64 }}
          APP_P12_PASS: ${{ secrets.APP_P12_PASS }}
          IOS_PROV_PROFILE_BASE64: ${{ secrets.IOS_PROV_PROFILE_BASE64 }}
        run: |
          echo -n "$APP_P12_BASE64" | base64 -d > ios/ios_distribution.p12
          echo -n "$IOS_PROV_PROFILE_BASE64" | base64 -d > ios/provisioning_profile.mobileprovision

      # 7️⃣ Setup signing (keychain + cert + profile)
      - name: Setup Signing
        env:
          APP_P12_PASS: ${{ secrets.APP_P12_PASS }}
        run: |
          # Create temporary keychain
          security create-keychain -p "$APP_P12_PASS" ~/ios-build.keychain-db

          # Import certificate
          security import ios/ios_distribution.p12 -P "$APP_P12_PASS" -A -t cert -f pkcs12 -k ~/ios-build.keychain-db

          # Make keychain default and allow access
          security list-keychains -d user -s ~/ios-build.keychain-db
          security set-keychain-settings -lut 21600 ~/ios-build.keychain-db
          security unlock-keychain -p "$APP_P12_PASS" ~/ios-build.keychain-db

          # Set partition list for signing
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$APP_P12_PASS" ~/ios-build.keychain-db

          # Install provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles/
          cp ios/provisioning_profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

      # 8️⃣ Build iOS app
      - name: Build iOS App
        run: |
          mkdir -p build
          xcodebuild -workspace ios/CoinMob.xcworkspace \
                     -scheme CoinMob \
                     -configuration Release \
                     -archivePath $PWD/build/CoinMob.xcarchive \
                     archive

          xcodebuild -exportArchive \
                     -archivePath $PWD/build/CoinMob.xcarchive \
                     -exportOptionsPlist ios/ExportOptions.plist \
                     -exportPath $PWD/build

      # 9️⃣ Upload the IPA artifact
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: CoinMob.ipa
          path: ./build/*.ipa
